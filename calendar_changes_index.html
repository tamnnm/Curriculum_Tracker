<!DOCTYPE html>
<!-- PASTE THIS INTO index.html IN YOUR APPS SCRIPT PROJECT -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calendar Changes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #ffffff;
    color: #111827;
    font-size: 13px;
    padding: 14px;
  }

  h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6B7280;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section { margin-bottom: 20px; }

  .event-card {
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 7px;
    border-left: 3px solid #E5E7EB;
    background: #F9FAFB;
  }

  .event-card.new {
    border-left-color: #10B981;
    background: #F0FDF4;
  }

  .event-card.changed {
    border-left-color: #F59E0B;
    background: #FFFBEB;
  }

  .event-title {
    font-weight: 600;
    font-size: 13px;
    color: #111827;
    margin-bottom: 3px;
  }

  .event-meta {
    font-size: 11px;
    color: #6B7280;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    border-radius: 99px;
    padding: 1px 7px;
  }

  .badge-new     { background: #D1FAE5; color: #065F46; }
  .badge-changed { background: #FEF3C7; color: #92400E; }
  .badge-cal     { background: #EDE9FE; color: #5B21B6; }

  .empty {
    font-size: 12px;
    color: #9CA3AF;
    font-style: italic;
    padding: 6px 0;
  }

  .divider {
    height: 1px;
    background: #E5E7EB;
    margin: 16px 0;
  }

  .footer {
    font-size: 10px;
    color: #D1D5DB;
    text-align: right;
    margin-top: 12px;
  }

  .spinner {
    text-align: center;
    padding: 30px;
    color: #9CA3AF;
    font-size: 12px;
  }

  .error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 8px;
    padding: 10px 12px;
    color: #991B1B;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="root"><div class="spinner">Loading calendar…</div></div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmt(ts, allDay) {
  const d = new Date(ts);
  const day  = DAYS[d.getDay()];
  const date = d.getDate();
  const mon  = MONTHS[d.getMonth()];
  if (allDay) return `${day} ${date} ${mon}`;
  const h = d.getHours(), m = d.getMinutes();
  const hh = h % 12 || 12;
  const mm = m.toString().padStart(2, '0');
  const ap = h < 12 ? 'am' : 'pm';
  return `${day} ${date} ${mon} · ${hh}:${mm}${ap}`;
}

function card(ev) {
  const cls   = ev.isNew ? 'new' : ev.isChanged ? 'changed' : '';
  const badge = ev.isNew
    ? '<span class="badge badge-new">New</span>'
    : ev.isChanged
    ? '<span class="badge badge-changed">Changed</span>'
    : '';
  return `
    <div class="event-card ${cls}">
      <div class="event-title">${ev.title || '(no title)'}</div>
      <div class="event-meta">
        <span>${fmt(ev.start, ev.allDay)}</span>
        ${badge}
        <span class="badge badge-cal">${ev.calendar}</span>
      </div>
    </div>`;
}

function render(data) {
  const { changes, upcoming, asOf } = data;

  const changesHtml = changes.length
    ? changes.map(card).join('')
    : '<div class="empty">No changes in the last 5 days.</div>';

  const upcomingHtml = upcoming.length
    ? upcoming.slice(0, 8).map(card).join('')
    : '<div class="empty">No upcoming events in the next 2 weeks.</div>';

  const asOfStr = new Date(asOf).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  document.getElementById('root').innerHTML = `
    <div class="section">
      <h2>🔔 Recent Changes</h2>
      ${changesHtml}
    </div>
    <div class="divider"></div>
    <div class="section">
      <h2>📅 Upcoming (2 weeks)</h2>
      ${upcomingHtml}
    </div>
    <div class="footer">Updated at ${asOfStr} · refreshes every 5 min</div>
  `;
}

function load() {
  google.script.run
    .withSuccessHandler(function(json) {
      try {
        render(JSON.parse(json));
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div class="error">Error reading calendar data.</div>';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('root').innerHTML =
        `<div class="error">Failed to load: ${err.message}</div>`;
    })
    .getCalendarData();
}

// Load now, then auto-refresh every 5 minutes
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
