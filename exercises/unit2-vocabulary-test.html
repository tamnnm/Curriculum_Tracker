<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 2 Vocabulary Test — Health, Nutrition & Emotions</title>
<style>
  :root{
    --blue:#2b5fb8; --blue-dark:#1e4488; --green:#1f9d55; --red:#d64545;
    --bg:#f4f6fb; --card:#ffffff; --border:#e0e4ee; --text:#222; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.55;
  }
  header{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:#fff; padding:32px 20px 26px; text-align:center;
  }
  header h1{margin:0 0 6px; font-size:1.6rem;}
  header p{margin:2px 0; opacity:.9; font-size:.95rem;}
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 80px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:20px 22px; margin-bottom:18px; box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .student-info label{display:block; font-weight:600; margin:10px 0 4px; font-size:.92rem;}
  .student-info input{
    width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:6px; font-size:.95rem;
  }
  section.qsection{margin-bottom:26px;}
  .section-title{
    background:var(--blue); color:#fff; padding:10px 16px; border-radius:8px 8px 0 0;
    font-size:1.05rem; font-weight:700;
  }
  .section-instructions{
    background:#eef2fb; padding:10px 16px; font-size:.88rem; color:#334; border-bottom:1px solid var(--border);
  }
  .section-body{
    background:var(--card); border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; padding:6px 16px 12px;
  }
  .question{
    padding:14px 0; border-bottom:1px dashed var(--border);
  }
  .question:last-child{border-bottom:none;}
  .qtext{font-weight:600; margin:0 0 8px; font-size:.96rem;}
  .options{display:flex; flex-direction:column; gap:6px;}
  .options label{
    display:flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:.92rem; transition:background .15s;
  }
  .options label:hover{background:#f5f7ff;}
  select, input[type="text"]{
    width:100%; max-width:420px; padding:8px 10px; border:1px solid var(--border);
    border-radius:6px; font-size:.92rem;
  }
  .feedback{
    margin-top:8px; font-size:.85rem; font-weight:600; padding:6px 10px; border-radius:6px; display:none;
  }
  .question.correct{background:#f0faf3; border-radius:8px;}
  .question.incorrect{background:#fdf1f1; border-radius:8px;}
  .question.correct .feedback{display:block; color:var(--green); background:#e3f7e9;}
  .question.incorrect .feedback{display:block; color:var(--red); background:#fbe6e6;}
  .toolbar{
    position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border);
    padding:14px 16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
    box-shadow:0 -2px 8px rgba(0,0,0,.05);
  }
  button{
    border:none; border-radius:8px; padding:12px 26px; font-size:1rem; font-weight:700;
    cursor:pointer; transition:transform .1s;
  }
  button:active{transform:scale(.97);}
  #checkBtn{background:var(--blue); color:#fff;}
  #resetBtn{background:#e5e7eb; color:#333;}
  #scoreBox{
    display:none; position:sticky; top:0; z-index:5; background:#fff8e6; border:2px solid #f2c744;
    border-radius:10px; padding:14px 18px; margin-bottom:18px; text-align:center; font-size:1.1rem; font-weight:700;
  }
  #scoreBox .sub{font-size:.85rem; font-weight:500; color:var(--muted); margin-top:4px;}
  @media print{ .toolbar{display:none;} }
</style>
</head>
<body>

<header>
  <h1>UNIT 2 VOCABULARY TEST</h1>
  <p>Health, Nutrition, Sleep &amp; Emotions</p>
  <p>Recommended time: 35–45 minutes</p>
</header>

<div class="wrap">

  <div class="card student-info">
    <label for="studentName">Full Name</label>
    <input type="text" id="studentName" placeholder="Enter your name">
    <label for="studentClass">Class / Group</label>
    <input type="text" id="studentClass" placeholder="Enter your class">
  </div>

  <div id="scoreBox"></div>

  <div id="quizContainer"></div>

  <div class="toolbar">
    <button id="checkBtn">Check Answers</button>
    <button id="resetBtn" type="button">Reset Quiz</button>
  </div>

</div>

<script>
const quizData = [

  {
    id: "v1",
    title: "V1. Multiple Choice Meaning",
    instructions: "Choose the correct meaning for each word.",
    type: "mcq",
    questions: [
      { q: "1. Obesity means:", options: ["lack of food","excessive body fat","recovery from illness","infection"], answer: 1 },
      { q: "2. Malnutrition means:", options: ["lack of proper nutrients in the diet","eating too many vitamins","a sleep disorder","a type of exercise"], answer: 0 },
      { q: "3. Diabetes means:", options: ["a skin allergy","a type of bacterial infection","a condition where the body can't regulate blood sugar properly","a mild form of anxiety"], answer: 2 },
      { q: "4. Recovery means:", options: ["a strict diet plan","the process of becoming well again after illness","a medical test","the process of becoming ill"], answer: 1 },
      { q: "5. Susceptible means:", options: ["completely immune to something","resistant to change","likely to be affected or harmed by something","very confident"], answer: 2 },
      { q: "6. Crave means:", options: ["to refuse something completely","to have a strong desire for something","to forget about something","to avoid something"], answer: 1 },
      { q: "7. Suppress means:", options: ["to express a feeling openly","to increase something","to celebrate something","to hold back or control a feeling or reaction"], answer: 3 },
      { q: "8. Exhausted means:", options: ["extremely tired","mildly tired","wide awake","very energetic"], answer: 0 },
      { q: "9. Alarming means:", options: ["calm and reassuring","boring","exciting in a good way","causing worry or concern"], answer: 3 },
      { q: "10. Empathy means:", options: ["a lack of concern for others","a medical condition","the ability to understand and share another person's feelings","a type of argument"], answer: 2 }
    ]
  },

  {
    id: "v2",
    title: "V2. Multiple Choice Usage",
    instructions: "Choose the word or phrase that best completes each sentence.",
    type: "mcq",
    questions: [
      { q: "1. Eating too much ______ can lead to health problems like obesity.", options: ["junk food","vegetarian","bacteria","recovery"], answer: 0 },
      { q: "2. Doctors often ______ patients about the dangers of smoking.", options: ["restore","warn","consume","suppress"], answer: 1 },
      { q: "3. A healthy diet helps to ______ your immune system.", options: ["suppress","crave","promote","malnourish"], answer: 2 },
      { q: "4. Getting ______ is essential for the body to fight off infection.", options: ["junk food","poverty","diabetes","quality sleep"], answer: 3 },
      { q: "5. ______ can make people more susceptible to illness.", options: ["Recovery","Poverty","Empathy","Efficiency"], answer: 1 },
      { q: "6. Untreated infections can sometimes lead to serious ______.", options: ["disease","empathy","recovery","patience"], answer: 0 },
      { q: "7. High blood pressure is often linked to a diet high in ______ and a lack of exercise.", options: ["empathy","quality sleep","junk food","self-control"], answer: 2 },
      { q: "8. It's important to ______ your feelings in a healthy way rather than bottling them up.", options: ["suppress","crave","restore","express"], answer: 3 },
      { q: "9. After the operation, it took him several weeks to fully ______.", options: ["crave","recover","warn","suppress"], answer: 1 },
      { q: "10. Working as a team requires patience and ______.", options: ["competitiveness","disagreement","collaboration","anxiety"], answer: 2 }
    ]
  },

  {
    id: "v3",
    title: "V3. Gap Fill with Word Bank",
    instructions: "Word Bank: consume, obesity, malnutrition, diabetes, infection, recovery, susceptible, crave, suppress, efficient, exhausted, alarming, anxious, depression, empathy, confident, generous, punctual, reluctant. (Not every word in the bank is used.)",
    type: "dropdown",
    dropdownOptions: ["consume","obesity","malnutrition","diabetes","infection","recovery","susceptible","crave","suppress","efficient","exhausted","alarming","anxious","depression","empathy","confident","generous","punctual","reluctant"],
    questions: [
      { q: "1. Eating too many calories without proper nutrients can lead to __________.", answer: "obesity" },
      { q: "2. A diet lacking essential nutrients over a long period causes __________.", answer: "malnutrition" },
      { q: "3. She was diagnosed with __________ and now has to monitor her blood sugar levels daily.", answer: "diabetes" },
      { q: "4. A cut that isn't cleaned properly can develop an __________.", answer: "infection" },
      { q: "5. After weeks of rest, she made a full __________.", answer: "recovery" },
      { q: "6. People with weak immune systems are more __________ to colds.", answer: "susceptible" },
      { q: "7. Pregnant women often __________ unusual food combinations.", answer: "crave" },
      { q: "8. He tried to __________ his anger during the meeting.", answer: "suppress" },
      { q: "9. A well-organised worker completes tasks in an __________ way.", answer: "efficient" },
      { q: "10. After the long flight, they felt completely __________.", answer: "exhausted" },
      { q: "11. The rise in childhood obesity rates is __________.", answer: "alarming" },
      { q: "12. She felt __________ before her first job interview.", answer: "anxious" },
      { q: "13. Ongoing sadness and hopelessness can be signs of __________.", answer: "depression" },
      { q: "14. Good doctors show __________ towards their patients' fears.", answer: "empathy" },
      { q: "15. He didn't __________ enough water during the hike, so he became dehydrated.", answer: "consume" }
    ]
  },

  {
    id: "v5",
    title: "V5. Matching Collocations",
    instructions: "For each item (1–8), choose the word (A–H) that collocates with it.",
    type: "dropdown",
    dropdownOptions: [
      {value:"A", label:"A. junk"},
      {value:"B", label:"B. immune"},
      {value:"C", label:"C. blood"},
      {value:"D", label:"D. heart"},
      {value:"E", label:"E. quality"},
      {value:"F", label:"F. supportive"},
      {value:"G", label:"G. cool"},
      {value:"H", label:"H. self-"}
    ],
    questions: [
      { q: "1. system", answer: "B" },
      { q: "2. disease", answer: "D" },
      { q: "3. food", answer: "A" },
      { q: "4. pressure", answer: "C" },
      { q: "5. sleep", answer: "E" },
      { q: "6. family", answer: "F" },
      { q: "7. head", answer: "G" },
      { q: "8. control", answer: "H" }
    ]
  },

  {
    id: "v6",
    title: "V6. Verb Phrase Matching (Contextualised)",
    instructions: "Match each sentence's highlighted phrase with its meaning.",
    type: "dropdown",
    dropdownOptions: [
      {value:"1", label:"1. Guess or form a theory without complete evidence"},
      {value:"2", label:"2. Bring something back to a good or normal condition"},
      {value:"3", label:"3. Participate actively in an activity"},
      {value:"4", label:"4. Stay calm and think clearly under pressure"}
    ],
    questions: [
      { q: "A. She always gets involved in community projects to help others.", answer: "3" },
      { q: "B. He managed to keep a cool head even during the emergency.", answer: "4" },
      { q: "C. Doctors speculate that lack of sleep contributes to heart disease.", answer: "1" },
      { q: "D. A balanced diet can help restore your energy levels.", answer: "2" }
    ]
  },

  {
    id: "v7",
    title: "V7. Multiple Meaning / Confusing Words",
    instructions: "Choose the word that does NOT belong.",
    type: "mcq",
    questions: [
      { q: "1.", options: ["delighted","angry","annoyed","furious"], answer: 0 },
      { q: "2.", options: ["nervous","ecstatic","anxious","apprehensive"], answer: 1 },
      { q: "3.", options: ["depressed","miserable","thrilled","unhappy"], answer: 2 },
      { q: "4.", options: ["frightened","terrified","scared","embarrassed"], answer: 3 },
      { q: "5.", options: ["recovery","disease","infection","illness"], answer: 0 },
      { q: "6.", options: ["obesity","efficient","malnutrition","undernourished"], answer: 1 },
      { q: "7.", options: ["empathy","patience","competitiveness","self-control"], answer: 2 },
      { q: "8.", options: ["crave","desire","want","suppress"], answer: 3 },
      { q: "9.", options: ["alarming","exhausted","tired","weary"], answer: 0 },
      { q: "10.", options: ["collaboration","teamwork","disagreement","cooperation"], answer: 2 }
    ]
  },

  {
    id: "v8",
    title: "V8. Word Formation",
    instructions: "Write the correct form of the word in CAPITALS.",
    type: "text",
    questions: [
      { q: "1. Doctors warn that a diet high in fat and sugar increases the risk of __________. (OBESE)", answer: ["obesity"] },
      { q: "2. Millions of children in the region are __________ due to poverty. (NOURISH)", answer: ["undernourished"] },
      { q: "3. The wound became __________ because it wasn't cleaned properly. (INFECT)", answer: ["infected"] },
      { q: "4. It took her several months to make a full __________ after the accident. (RECOVER)", answer: ["recovery"] },
      { q: "5. Genetic factors can increase a person's __________ to certain diseases. (SUSCEPTIBLE)", answer: ["susceptibility"] },
      { q: "6. Constant work pressure eventually led to his __________. (EXHAUST)", answer: ["exhaustion"] },
      { q: "7. The number of obesity-related illnesses is __________ rising. (ALARM)", answer: ["alarmingly"] },
      { q: "8. She has always been an __________ person, worrying about everything. (ANXIETY)", answer: ["anxious"] },
      { q: "9. His __________ was so severe that he needed professional help. (DEPRESS)", answer: ["depression"] },
      { q: "10. The nurse treated every patient with great __________. (EMPATHETIC)", answer: ["empathy"] },
      { q: "11. She waited for the test results with great __________. (PATIENT)", answer: ["patience"] },
      { q: "12. Working as a team requires good __________ between members. (COLLABORATE)", answer: ["collaboration"] },
      { q: "13. Some workplaces encourage __________ rather than teamwork. (COMPETE)", answer: ["competitiveness"] },
      { q: "14. Good sleep habits can significantly improve your overall __________. (EFFICIENT)", answer: ["efficiency"] },
      { q: "15. Constant __________ of emotions can lead to long-term stress. (SUPPRESS)", answer: ["suppression"] }
    ]
  },

  {
    id: "v10",
    title: "V10. Synonym Selection",
    instructions: "Choose the closest meaning of the highlighted word.",
    type: "mcq",
    questions: [
      { q: "1. She felt utterly exhausted after the marathon.", options: ["relaxed","energetic","extremely tired","slightly bored"], answer: 2 },
      { q: "2. His constant cravings for sugary food worried his doctor.", options: ["strong desires","dislikes","memories","habits"], answer: 0 },
      { q: "3. The rise in obesity rates is alarming.", options: ["reassuring","surprising in a good way","minor","worrying"], answer: 3 },
      { q: "4. People who suppress their emotions may struggle later on.", options: ["express openly","hold back","celebrate","share"], answer: 1 },
      { q: "5. Children in poverty are more susceptible to malnutrition.", options: ["resistant","protected","likely to be affected","unaware"], answer: 2 },
      { q: "6. The doctor showed great empathy towards her patients.", options: ["understanding of others' feelings","impatience","indifference","suspicion"], answer: 0 },
      { q: "7. He remained anxious throughout the entire interview.", options: ["calm","confident","cheerful","worried"], answer: 3 },
      { q: "8. Good teamwork depends on collaboration, not competitiveness.", options: ["rivalry","working together","independence","silence"], answer: 1 },
      { q: "9. Her recovery from the illness was faster than expected.", options: ["decline","diagnosis","process of getting better","relapse"], answer: 2 },
      { q: "10. He tried to consume more vegetables after his diagnosis.", options: ["eat or drink","avoid","throw away","grow"], answer: 0 }
    ]
  }
];

const container = document.getElementById("quizContainer");
const letters = ["A","B","C","D"];

quizData.forEach(section => {
  const sec = document.createElement("section");
  sec.className = "qsection";

  const titleDiv = document.createElement("div");
  titleDiv.className = "section-title";
  titleDiv.textContent = section.title;
  sec.appendChild(titleDiv);

  if (section.instructions) {
    const instr = document.createElement("div");
    instr.className = "section-instructions";
    instr.textContent = section.instructions;
    sec.appendChild(instr);
  }

  const body = document.createElement("div");
  body.className = "section-body";

  section.questions.forEach((item, qIndex) => {
    const qId = `${section.id}-${qIndex}`;
    const qDiv = document.createElement("div");
    qDiv.className = "question";
    qDiv.id = `wrap-${qId}`;

    const qText = document.createElement("p");
    qText.className = "qtext";
    qText.textContent = item.q;
    qDiv.appendChild(qText);

    if (section.type === "mcq") {
      const optsDiv = document.createElement("div");
      optsDiv.className = "options";
      item.options.forEach((opt, i) => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = qId;
        input.value = letters[i];
        label.appendChild(input);
        label.appendChild(document.createTextNode(`${letters[i]}. ${opt}`));
        optsDiv.appendChild(label);
      });
      qDiv.appendChild(optsDiv);

    } else if (section.type === "dropdown") {
      const select = document.createElement("select");
      select.id = qId;
      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "-- Select --";
      select.appendChild(blank);

      const opts = section.dropdownOptions;
      opts.forEach(opt => {
        const optionEl = document.createElement("option");
        if (typeof opt === "string") {
          optionEl.value = opt;
          optionEl.textContent = opt;
        } else {
          optionEl.value = opt.value;
          optionEl.textContent = opt.label;
        }
        select.appendChild(optionEl);
      });
      qDiv.appendChild(select);

    } else if (section.type === "text") {
      const input = document.createElement("input");
      input.type = "text";
      input.id = qId;
      input.autocomplete = "off";
      qDiv.appendChild(input);
    }

    const feedback = document.createElement("div");
    feedback.className = "feedback";
    feedback.id = `fb-${qId}`;
    qDiv.appendChild(feedback);

    body.appendChild(qDiv);
  });

  sec.appendChild(body);
  container.appendChild(sec);
});

function normalize(str){
  return (str || "").toString().trim().toLowerCase().replace(/\s+/g," ");
}

function checkAnswers(){
  let total = 0, earned = 0;
  const sectionScores = [];

  quizData.forEach(section => {
    let secEarned = 0;
    const secTotal = section.questions.length;

    section.questions.forEach((item, qIndex) => {
      total++;
      const qId = `${section.id}-${qIndex}`;
      const qDiv = document.getElementById(`wrap-${qId}`);
      const fb = document.getElementById(`fb-${qId}`);
      let isCorrect = false;
      let correctLabel = "";

      if (section.type === "mcq") {
        const selected = document.querySelector(`input[name="${qId}"]:checked`);
        const correctLetter = letters[item.answer];
        correctLabel = `${correctLetter}. ${item.options[item.answer]}`;
        if (selected && selected.value === correctLetter) isCorrect = true;

      } else if (section.type === "dropdown") {
        const select = document.getElementById(qId);
        const val = select ? select.value : "";
        isCorrect = normalize(val) === normalize(item.answer);
        const opts = section.dropdownOptions;
        const match = opts.find(o => (typeof o === "string" ? o : o.value) === item.answer);
        correctLabel = typeof match === "string" ? match : (match ? match.label : item.answer);

      } else if (section.type === "text") {
        const input = document.getElementById(qId);
        const val = normalize(input ? input.value : "");
        isCorrect = item.answer.some(a => normalize(a) === val);
        correctLabel = item.answer.join(" / ");
      }

      qDiv.classList.remove("correct","incorrect");
      if (isCorrect) {
        qDiv.classList.add("correct");
        fb.textContent = "✓ Correct";
        earned++; secEarned++;
      } else {
        qDiv.classList.add("incorrect");
        fb.textContent = `✗ Correct answer: ${correctLabel}`;
      }
    });

    sectionScores.push(`${section.title.split(".")[0]}: ${secEarned}/${secTotal}`);
  });

  const pct = Math.round((earned/total)*100);
  const scoreBox = document.getElementById("scoreBox");
  scoreBox.style.display = "block";
  scoreBox.innerHTML = `Score: ${earned} / ${total} (${pct}%)<div class="sub">${sectionScores.join(" &nbsp;|&nbsp; ")}</div>`;
  scoreBox.scrollIntoView({behavior:"smooth", block:"start"});
}

function resetQuiz(){
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('select').forEach(s => s.value = "");
  document.querySelectorAll('input[type="text"]').forEach(t => t.value = "");
  document.querySelectorAll('.question').forEach(q => q.classList.remove("correct","incorrect"));
  document.getElementById("scoreBox").style.display = "none";
  window.scrollTo({top:0, behavior:"smooth"});
}

document.getElementById("checkBtn").addEventListener("click", checkAnswers);
document.getElementById("resetBtn").addEventListener("click", resetQuiz);
</script>

</body>
</html>
