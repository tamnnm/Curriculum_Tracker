// ─── OEGC BADGE ──────────────────────────────────────────────────────────────
function OegcBadge({ sectionNum, compact }) {
  const st = OEGC_STATUS[sectionNum];
  const sec = OEGC_SECTIONS[sectionNum];
  const colors = {
    done:   { bg: "#D1FAE5", text: "#065F46", border: "#6EE7B7", label: "✓ Done" },
    review: { bg: "#FEF3C7", text: "#92400E", border: "#FCD34D", label: "⚠ Review" },
    next:   { bg: "#DBEAFE", text: "#1D4ED8", border: "#93C5FD", label: "▶ Next" },
    ahead:  { bg: "#F3F4F6", text: "#6B7280", border: "#E5E7EB", label: "Upcoming" },
  };
  const c = colors[st];
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: c.bg, border: `1.5px solid ${c.border}`,
      borderRadius: 8, padding: compact ? "4px 8px" : "6px 12px",
      marginBottom: compact ? 0 : 4,
    }}>
      <span style={{ fontWeight: 800, fontSize: compact ? 11 : 13, color: c.text }}>S{sectionNum}</span>
      <span style={{ fontSize: compact ? 11 : 12, color: c.text, fontWeight: 500 }}>{sec.title}</span>
      <span style={{
        fontSize: 10, fontWeight: 700, background: c.border, color: c.text,
        borderRadius: 10, padding: "1px 6px", marginLeft: 2,
      }}>{c.label}</span>
    </div>
  );
}

// ─── STATUS PILL ─────────────────────────────────────────────────────────────
function StatusPill({ status, onClick }) {
  const c = STATUS_COLORS[status];
  return (
    <button onClick={onClick} style={{
      background: c.bg, color: c.text, border: `1.5px solid ${c.border}`,
      borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 600,
      cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.dot, display: "inline-block" }} />
      {status}
    </button>
  );
}

// ─── INFO BLOCK ──────────────────────────────────────────────────────────────
function InfoBlock({ title, accent, muted, children }) {
  return (
    <div style={{
      background: muted ? "#FAFAFA" : "#F9FAFB",
      borderRadius: 8, padding: "10px 12px",
      borderLeft: `3px solid ${muted ? "#D1D5DB" : accent}`,
    }}>
      <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: muted ? "#9CA3AF" : accent, marginBottom: 5 }}>{title}</div>
      <div style={{ fontSize: 13, color: muted ? "#9CA3AF" : "#374151", lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

// ─── UNIT CARD ───────────────────────────────────────────────────────────────
function UnitCard({ unit, unitState, onStatusChange, onNoteChange }) {
  const [open, setOpen] = useState(false);
  const statuses = SKILL_LABELS.map(s => unitState?.skills?.[s] || (unit.unitDone ? "Completed" : "Not begun"));
  const doneCount = statuses.filter(s => s === "Completed").length;
  const pct = Math.round((doneCount / SKILL_LABELS.length) * 100);
  const allDone = unit.unitDone || doneCount === SKILL_LABELS.length;
  const anyReview = statuses.some(s => s === "Review needed");
  const anyInProg = statuses.some(s => s === "In progress");
  const cardBorder = allDone ? "#10B981" : anyReview ? "#F59E0B" : anyInProg ? "#3B82F6" : "#D1D5DB";

  return (
    <div style={{
      background: "#fff", borderRadius: 12,
      border: `1px solid #E5E7EB`, borderLeft: `4px solid ${cardBorder}`,
      marginBottom: 12, overflow: "hidden",
      boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
    }}>
      {/* Header row */}
      <div onClick={() => setOpen(o => !o)} style={{
        cursor: "pointer", padding: "14px 18px",
        display: "flex", alignItems: "center", gap: 14,
      }}>
        <span style={{
          width: 32, height: 32, borderRadius: 8,
          background: allDone ? "#D1FAE5" : "#F0F7F2",
          color: allDone ? "#065F46" : "#1B5E34",
          fontWeight: 800, fontSize: 13,
          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
        }}>
          {allDone ? "✓" : unit.id}
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#111827" }}>Unit {unit.id}: {unit.title}</div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2 }}>
            pp. {unit.pages} · Sem {unit.sem} · Wks {unit.weeks} ·{" "}
            <span style={{ color: "#7C3AED", fontWeight: 600 }}>OEGC {unit.oegcSections.map(n => `S${n}`).join(", ")}</span>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <div style={{ width: 56, height: 5, background: "#E5E7EB", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: `${allDone ? 100 : pct}%`, height: "100%", background: allDone ? "#10B981" : "#3B82F6", borderRadius: 4 }} />
          </div>
          <span style={{ fontSize: 12, color: "#9CA3AF", width: 32 }}>{allDone ? 100 : pct}%</span>
          <span style={{ fontSize: 18, color: "#9CA3AF", display: "inline-block", transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>›</span>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {SKILL_LABELS.map(skill => {
                const current = unitState?.skills?.[skill] || (unit.unitDone ? "Completed" : "Not begun");
                const idx = STATUS.indexOf(current);
                const next = STATUS[(idx + 1) % STATUS.length];
                return (
                  <div key={skill} style={{ display: "flex", alignItems: "center", gap: 6, background: "#F9FAFB", borderRadius: 8, padding: "5px 10px 5px 8px" }}>
                    <span style={{ fontSize: 12, color: "#374151", fontWeight: 500, marginRight: 4 }}>{skill}</span>
                    <StatusPill status={current} onClick={() => onStatusChange(unit.id, skill, next)} />
                  </div>
                );
              })}
            </div>
          </div>

          {/* Vocab + skills grid */}
          <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <InfoBlock title={`Vocabulary — ${unit.vocabThemes.join(" · ")}`} accent="#0369A1">
              <div style={{ marginBottom: 4 }}><span style={{ fontWeight: 600 }}>Core: </span>{unit.coreVocab.join(", ")}</div>
              <div style={{ marginBottom: 4 }}><span style={{ fontWeight: 600 }}>Word families: </span>{unit.wordFamilies.join(" | ")}</div>
              <div><span style={{ fontWeight: 600 }}>Phrasal verbs (EPVIU): </span>{unit.epviu.join(", ")}</div>
            </InfoBlock>
            <InfoBlock title="Use of English (GE9)" accent="#065F46">{unit.uoe.type}</InfoBlock>
            <InfoBlock title="✏️ Writing Tasks" accent="#1B5E34">{unit.writing}</InfoBlock>
            <InfoBlock title="🗣️ Speaking Tasks" accent="#1B5E34">{unit.speaking}</InfoBlock>
          </div>
          <div style={{ marginTop: 10 }}>
            <InfoBlock title="🎧 Listening" accent="#6B7280">{unit.listening}</InfoBlock>
          </div>

          {/* Notes */}
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#9CA3AF", marginBottom: 6 }}>Notes / Teacher Remarks</div>
            <textarea
              value={unitState?.notes || ""}
              onChange={e => onNoteChange(unit.id, e.target.value)}
              placeholder="Add notes, gaps noticed, what needs revisiting…"
              style={{
                width: "100%", minHeight: 60, borderRadius: 8,
                border: "1.5px solid #E5E7EB", padding: "8px 10px",
                fontSize: 13, color: "#374151", background: "#FAFAFA",
                resize: "vertical", fontFamily: "inherit", boxSizing: "border-box",
              }}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── OEGC OVERVIEW ───────────────────────────────────────────────────────────
function OegcOverview() {
  const statusInfo = {
    done:   { label: "Done ✓",    bg: "#D1FAE5", text: "#065F46", border: "#6EE7B7" },
    review: { label: "Review ⚠", bg: "#FEF3C7", text: "#92400E", border: "#FCD34D" },
    next:   { label: "Next ▶",   bg: "#DBEAFE", text: "#1D4ED8", border: "#93C5FD" },
    ahead:  { label: "Upcoming",  bg: "#F3F4F6", text: "#6B7280", border: "#E5E7EB" },
  };
  const unitForSection = {};
  UNITS.forEach(u => u.oegcSections.forEach(s => { unitForSection[s] = u.id; }));
  return (
    <div>
      <div style={{ background: "#F5F3FF", border: "1px solid #DDD6FE", borderRadius: 10, padding: "12px 16px", marginBottom: 20, fontSize: 13, color: "#5B21B6" }}>
        <b>Grammar track status:</b> S1–S5 ✓ done · S11 (articles) ✓ done —{" "}
        <span style={{ color: "#92400E", fontWeight: 700 }}>S5 + S11 still under review</span> ·{" "}
        <span style={{ color: "#1D4ED8", fontWeight: 700 }}>S6 (modal verbs) starting now</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8 }}>
        {Object.entries(OEGC_SECTIONS).map(([num, sec]) => {
          const n = Number(num);
          const st = OEGC_STATUS[n];
          const c = statusInfo[st];
          const uid = unitForSection[n];
          const unitTitle = uid ? UNITS.find(u => u.id === uid)?.title : "—";
          return (
            <div key={n} style={{
              background: c.bg, border: `1.5px solid ${c.border}`,
              borderRadius: 10, padding: "10px 14px",
              display: "flex", gap: 10, alignItems: "flex-start",
            }}>
              <span style={{ fontWeight: 800, fontSize: 16, color: c.text, minWidth: 28 }}>S{n}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: c.text }}>{sec.title}</div>
                <div style={{ fontSize: 11, color: c.text, opacity: 0.75 }}>pp. {sec.pages}</div>
                {uid && <div style={{ fontSize: 11, color: c.text, marginTop: 2, opacity: 0.7 }}>→ GE9 Unit {uid}: {unitTitle}</div>}
              </div>
              <span style={{ fontSize: 11, fontWeight: 700, background: c.border, color: c.text, borderRadius: 10, padding: "1px 7px", whiteSpace: "nowrap" }}>
                {c.label}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── YEAR OVERVIEW ───────────────────────────────────────────────────────────
function YearOverview({ state }) {
  function unitStatus(unit) {
    if (unit.unitDone) return "Completed";
    const statuses = SKILL_LABELS.map(s => state[unit.id]?.skills?.[s] || "Not begun");
    if (statuses.every(s => s === "Completed")) return "Completed";
    if (statuses.some(s => s === "Review needed")) return "Review needed";
    if (statuses.some(s => s === "In progress")) return "In progress";
    return "Not begun";
  }
  const sem1 = UNITS.filter(u => u.sem === 1);
  const sem2 = UNITS.filter(u => u.sem === 2);

  function SemBlock({ units, label }) {
    return (
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: "#1B5E34", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>{label}</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
          {units.map(unit => {
            const st = unitStatus(unit);
            const c = STATUS_COLORS[st];
            return (
              <div key={unit.id} style={{ background: c.bg, border: `1.5px solid ${c.border}`, borderRadius: 10, padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <span style={{ fontWeight: 800, fontSize: 18, color: "#D1D5DB" }}>U{unit.id}</span>
                  <span style={{ fontSize: 10, background: c.dot, color: "#fff", borderRadius: 10, padding: "1px 7px", fontWeight: 700 }}>{st}</span>
                </div>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#111827", marginTop: 4 }}>{unit.title}</div>
                <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>pp. {unit.pages} · Wks {unit.weeks}</div>
                <div style={{ fontSize: 11, color: "#7C3AED", fontWeight: 600, marginTop: 4 }}>
                  OEGC {unit.oegcSections.map(n => `S${n}`).join(", ")}
                </div>
                {unit.milestone && <div style={{ fontSize: 11, color: "#B45309", fontWeight: 700, marginTop: 4 }}>🏁 Milestone</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 10, padding: "12px 16px", marginBottom: 20, fontSize: 13, color: "#065F46" }}>
        <b>Global English 9 · 9 units · 37 weeks</b><br/>
        Vocabulary &amp; skills from GE9 · Grammar tracked separately via Oxford English Grammar Course (OEGC) · Phrasal verbs from EPVIU
      </div>
      <SemBlock units={sem1} label="Semester 1 — Units 1–4" />
      <SemBlock units={sem2} label="Semester 2 — Units 5–9" />
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
const STORAGE_KEY = "ge9-curriculum-v1";

function App() {
  const [tab, setTab] = useState("units");
  const [unitStates, setUnitStates] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const result = storage.get(STORAGE_KEY);
    if (result?.value) {
      try { setUnitStates(JSON.parse(result.value)); } catch {}
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    storage.set(STORAGE_KEY, JSON.stringify(unitStates));
  }, [unitStates, loaded]);

  function handleStatusChange(unitId, skill, newStatus) {
    setUnitStates(prev => ({
      ...prev,
      [unitId]: { ...prev[unitId], skills: { ...(prev[unitId]?.skills || {}), [skill]: newStatus } }
    }));
  }

  function handleNoteChange(unitId, note) {
    setUnitStates(prev => ({ ...prev, [unitId]: { ...prev[unitId], notes: note } }));
  }

  const allPairs = UNITS.flatMap(u => SKILL_LABELS.map(s => ({ uid: u.id, s, done: u.unitDone })));
  const total  = allPairs.length;
  const done   = allPairs.filter(({ uid, s, done: d }) => d || unitStates[uid]?.skills?.[s] === "Completed").length;
  const inProg = allPairs.filter(({ uid, s }) => unitStates[uid]?.skills?.[s] === "In progress").length;
  const review = allPairs.filter(({ uid, s }) => unitStates[uid]?.skills?.[s] === "Review needed").length;
  const pct    = Math.round((done / total) * 100);

  if (!loaded) return <div style={{ padding: 40, textAlign: "center", color: "#9CA3AF" }}>Loading…</div>;

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", minHeight: "100vh", background: "#F4F7F4" }}>
      {/* Header */}
      <div style={{ background: "#1B5E34", color: "#fff", padding: "20px 24px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.12em", opacity: 0.65, marginBottom: 3 }}>English Tutoring Plan · Grade 9</div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>Global English 9 — Full Year Curriculum</div>
          <div style={{ fontSize: 13, opacity: 0.75, marginTop: 2 }}>
            Vocabulary from GE9 · Grammar from Oxford English Grammar Course · Phrasal Verbs from EPVIU
          </div>
          <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.2)", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: "#4ADE80", borderRadius: 4 }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 700, minWidth: 38 }}>{pct}%</span>
          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 7, fontSize: 12, opacity: 0.8, flexWrap: "wrap" }}>
            <span>✅ Done: {done}</span>
            <span>🔵 In progress: {inProg}</span>
            <span>🟡 Review needed: {review}</span>
            <span>⬜ Not begun: {total - done - inProg - review}</span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex" }}>
          {[["units", "Unit Plans"], ["oegc", "OEGC Track"], ["overview", "Year Overview"]].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)} style={{
              padding: "12px 22px", fontSize: 13, fontWeight: 600, cursor: "pointer",
              background: "none", border: "none",
              borderBottom: tab === key ? "3px solid #1B5E34" : "3px solid transparent",
              color: tab === key ? "#1B5E34" : "#6B7280",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>
        {tab === "units" && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
              {STATUS.map(s => {
                const c = STATUS_COLORS[s];
                return (
                  <span key={s} style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: c.text, background: c.bg, border: `1px solid ${c.border}`, borderRadius: 20, padding: "3px 10px" }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.dot }} />{s}
                  </span>
                );
              })}
              <span style={{ fontSize: 12, color: "#9CA3AF" }}>— click to cycle</span>
            </div>
            {UNITS.map(unit => (
              <UnitCard key={unit.id} unit={unit} unitState={unitStates[unit.id]}
                onStatusChange={handleStatusChange} onNoteChange={handleNoteChange} />
            ))}
          </div>
        )}
        {tab === "oegc" && <OegcOverview />}
        {tab === "overview" && <YearOverview state={unitStates} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
