<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 1 Vocabulary Test — Learning, Personality & Society</title>
<style>
  :root{
    --blue:#2b5fb8; --blue-dark:#1e4488; --green:#1f9d55; --red:#d64545;
    --bg:#f4f6fb; --card:#ffffff; --border:#e0e4ee; --text:#222; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.55;
  }
  header{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:#fff; padding:32px 20px 26px; text-align:center;
  }
  header h1{margin:0 0 6px; font-size:1.6rem;}
  header p{margin:2px 0; opacity:.9; font-size:.95rem;}
  .wrap{max-width:820px; margin:0 auto; padding:20px 16px 80px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:20px 22px; margin-bottom:18px; box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .student-info label{display:block; font-weight:600; margin:10px 0 4px; font-size:.92rem;}
  .student-info input{
    width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:6px; font-size:.95rem;
  }
  section.qsection{margin-bottom:26px;}
  .section-title{
    background:var(--blue); color:#fff; padding:10px 16px; border-radius:8px 8px 0 0;
    font-size:1.05rem; font-weight:700;
  }
  .section-instructions{
    background:#eef2fb; padding:10px 16px; font-size:.88rem; color:#334; border-bottom:1px solid var(--border);
  }
  .section-body{
    background:var(--card); border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; padding:6px 16px 12px;
  }
  .question{
    padding:14px 0; border-bottom:1px dashed var(--border);
  }
  .question:last-child{border-bottom:none;}
  .qtext{font-weight:600; margin:0 0 8px; font-size:.96rem;}
  .options{display:flex; flex-direction:column; gap:6px;}
  .options label{
    display:flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:.92rem; transition:background .15s;
  }
  .options label:hover{background:#f5f7ff;}
  select, input[type="text"]{
    width:100%; max-width:420px; padding:8px 10px; border:1px solid var(--border);
    border-radius:6px; font-size:.92rem;
  }
  .feedback{
    margin-top:8px; font-size:.85rem; font-weight:600; padding:6px 10px; border-radius:6px; display:none;
  }
  .question.correct{background:#f0faf3; border-radius:8px;}
  .question.incorrect{background:#fdf1f1; border-radius:8px;}
  .question.correct .feedback{display:block; color:var(--green); background:#e3f7e9;}
  .question.incorrect .feedback{display:block; color:var(--red); background:#fbe6e6;}
  .toolbar{
    position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border);
    padding:14px 16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
    box-shadow:0 -2px 8px rgba(0,0,0,.05);
  }
  button{
    border:none; border-radius:8px; padding:12px 26px; font-size:1rem; font-weight:700;
    cursor:pointer; transition:transform .1s;
  }
  button:active{transform:scale(.97);}
  #checkBtn{background:var(--blue); color:#fff;}
  #resetBtn{background:#e5e7eb; color:#333;}
  #scoreBox{
    display:none; position:sticky; top:0; z-index:5; background:#fff8e6; border:2px solid #f2c744;
    border-radius:10px; padding:14px 18px; margin-bottom:18px; text-align:center; font-size:1.1rem; font-weight:700;
  }
  #scoreBox .sub{font-size:.85rem; font-weight:500; color:var(--muted); margin-top:4px;}
  .required-note{color:var(--red); font-size:.85rem; margin-top:6px;}
  @media print{ .toolbar{display:none;} }
</style>
</head>
<body>

<header>
  <h1>UNIT 1 VOCABULARY TEST</h1>
  <p>Chapter 1: Learning, Personality &amp; Society</p>
  <p>Recommended time: 35–45 minutes</p>
</header>

<div class="wrap">

  <div class="card student-info">
    <label for="studentName">Full Name</label>
    <input type="text" id="studentName" placeholder="Enter your name">
    <label for="studentClass">Class / Group</label>
    <input type="text" id="studentClass" placeholder="Enter your class">
  </div>

  <div id="scoreBox"></div>

  <div id="quizContainer"></div>

  <div class="toolbar">
    <button id="checkBtn">Check Answers</button>
    <button id="resetBtn" type="button">Reset Quiz</button>
  </div>

</div>

<script>
/* ============================================================
   QUIZ DATA (v2 — revised)
   - V3: word bank now includes 4 distractor words not tied to any blank
   - V5: item 4 "flexibility"->"skills" and item 6 "bad influence"->"temptation"
         (fixes an unnatural collocation and a duplicate-answer overlap)
   - V7: correct-answer position reshuffled across A-D (was always D)
   type: "mcq" (radio A-D), "dropdown" (select), "text" (typed answer)
   ============================================================ */
const quizData = [

  {
    id: "v1",
    title: "V1. Multiple Choice Meaning",
    instructions: "Choose the correct meaning for each word.",
    type: "mcq",
    questions: [
      { q: "1. Distract means:", options: ["help somebody focus","take somebody's attention away","encourage somebody","punish somebody"], answer: 1 },
      { q: "2. Ambition means:", options: ["a strong desire to achieve something","a problem","a protest","a habit"], answer: 0 },
      { q: "3. Defiant means:", options: ["obedient","polite","openly resisting authority","frightened"], answer: 2 },
      { q: "4. Considerate means:", options: ["selfish","thoughtful towards others","rebellious","careless"], answer: 1 },
      { q: "5. Petition means:", options: ["a written request signed by many people","a speech","a newspaper article","a demonstration"], answer: 0 },
      { q: "6. Creativity means:", options: ["ability to memorize facts","ability to follow instructions","ability to produce original ideas","ability to organise meetings"], answer: 2 },
      { q: "7. Stereotype means:", options: ["a fixed and oversimplified belief","a scientific theory","an ambition","a complaint"], answer: 0 },
      { q: "8. Rebellious means:", options: ["likely to obey rules","likely to challenge authority","very sensible","very concerned"], answer: 1 },
      { q: "9. Gracious means:", options: ["polite and kind","nervous","rude","stubborn"], answer: 0 },
      { q: "10. Issue means:", options: ["a personality trait","an important problem or topic","a demonstration","a decade"], answer: 1 }
    ]
  },

  {
    id: "v2",
    title: "V2. Multiple Choice Usage",
    instructions: "Choose the word that best completes each sentence.",
    type: "mcq",
    questions: [
      { q: "1. Good teachers try to ______ students to ask questions.", options: ["distract","discourage","encourage","interrupt"], answer: 2 },
      { q: "2. Please don't ______ me while I'm speaking.", options: ["focus","interrupt","encourage","descend"], answer: 1 },
      { q: "3. Social media often ______ students from their studies.", options: ["distracts","concentrates","obeys","focuses"], answer: 0 },
      { q: "4. The workers decided to ______ because of poor working conditions.", options: ["go on strike","concentrate","descend","focus"], answer: 0 },
      { q: "5. Parents sometimes ______ children for bad behaviour.", options: ["focus on","tell off","descend into","encourage"], answer: 1 },
      { q: "6. You should ______ your homework before watching TV.", options: ["concentrate on","distract","rebel","petition"], answer: 0 },
      { q: "7. Many teenagers ______ bad influence from their peers.", options: ["succumb to","descend into","encourage","concern"], answer: 0 },
      { q: "8. Thousands of people signed a ______ demanding lower tuition fees.", options: ["stereotype","petition","creativity","decade"], answer: 1 },
      { q: "9. She remained calm and ______ during the argument.", options: ["rebellious","considerate","cheeky","defiant"], answer: 1 },
      { q: "10. Climate change is a major global ______.", options: ["ambition","creativity","issue","stereotype"], answer: 2 }
    ]
  },

  {
    id: "v3",
    title: "V3. Gap Fill with Word Bank",
    instructions: "Word Bank: interrupt, distract, encourage, discourage, ambition, focus, creativity, stereotype, considerate, rebellious, defiant, petition, issue, decade, gracious, obedient, cautious, arrogant, diligent. (Not every word in the bank is used.)",
    type: "dropdown",
    dropdownOptions: ["interrupt","distract","encourage","discourage","ambition","focus","creativity","stereotype","considerate","rebellious","defiant","petition","issue","decade","gracious","obedient","cautious","arrogant","diligent"],
    questions: [
      { q: "1. Please don't __________ me while I'm presenting.", answer: "interrupt" },
      { q: "2. Advertisements can sometimes __________ children from studying.", answer: "distract" },
      { q: "3. Teachers should __________ students to think independently.", answer: "encourage" },
      { q: "4. Constant criticism may __________ learners from trying again.", answer: "discourage" },
      { q: "5. Her greatest __________ is to become a scientist.", answer: "ambition" },
      { q: "6. You need more __________ if you want to finish the project.", answer: "focus" },
      { q: "7. The competition required a lot of __________.", answer: "creativity" },
      { q: "8. The film challenges a common gender __________.", answer: "stereotype" },
      { q: "9. He was very __________ and offered to help everyone.", answer: "considerate" },
      { q: "10. The teenager became increasingly __________ at school.", answer: "rebellious" },
      { q: "11. Her attitude towards the rules was openly __________.", answer: "defiant" },
      { q: "12. Thousands signed a __________ against the new law.", answer: "petition" },
      { q: "13. Housing remains an important social __________.", answer: "issue" },
      { q: "14. The project took nearly a __________ to complete.", answer: "decade" },
      { q: "15. The host was very __________ and welcomed all guests warmly.", answer: "gracious" }
    ]
  },

  {
    id: "v5",
    title: "V5. Matching Collocations",
    instructions: "For each item (1–8), choose the word/phrase (A–H) that collocates with it.",
    type: "dropdown",
    dropdownOptions: [
      {value:"A", label:"A. social"},
      {value:"B", label:"B. risk"},
      {value:"C", label:"C. self-"},
      {value:"D", label:"D. bad"},
      {value:"E", label:"E. go on"},
      {value:"F", label:"F. tell somebody"},
      {value:"G", label:"G. succumb to"},
      {value:"H", label:"H. concentrate"}
    ],
    questions: [
      { q: "1. analysis", answer: "C" },
      { q: "2. influence", answer: "D" },
      { q: "3. strike", answer: "E" },
      { q: "4. skills", answer: "A" },
      { q: "5. off", answer: "F" },
      { q: "6. temptation", answer: "G" },
      { q: "7. on", answer: "H" },
      { q: "8. assessment", answer: "B" }
    ]
  },

  {
    id: "v6",
    title: "V6. Phrasal Verb Matching (Contextualised)",
    instructions: "Match each sentence's highlighted phrasal verb with its meaning.",
    type: "dropdown",
    dropdownOptions: [
      {value:"1", label:"1. Give in to something negative"},
      {value:"2", label:"2. Focus your attention on something"},
      {value:"3", label:"3. Scold someone"},
      {value:"4", label:"4. Begin or participate in industrial action"}
    ],
    questions: [
      { q: "A. The teacher <told him off for using his phone in class.", answer: "3" },
      { q: "B. The factory workers decided to go on strike after negotiations failed.", answer: "4" },
      { q: "C. You should concentrate on the task instead of chatting.", answer: "2" },
      { q: "D. Many teenagers eventually succumb to peer pressure.", answer: "1" }
    ]
  },

  {
    id: "v7",
    title: "V7. Multiple Meaning / Confusing Words",
    instructions: "Choose the word that does NOT belong.",
    type: "mcq",
    questions: [
      { q: "1.", options: ["considerate","rebellious","defiant","disobedient"], answer: 0 },
      { q: "2.", options: ["creativity","imagination","petition","originality"], answer: 2 },
      { q: "3.", options: ["distract","encourage","disturb","interrupt"], answer: 1 },
      { q: "4.", options: ["rage","anger","fury","ambition"], answer: 3 },
      { q: "5.", options: ["creativity","petition","placard","demonstration"], answer: 0 },
      { q: "6.", options: ["sensible","thoughtful","rebellious","considerate"], answer: 2 },
      { q: "7.", options: ["concern","creativity","anxiety","worry"], answer: 1 },
      { q: "8.", options: ["distracted","independent","self-reliant","autonomous"], answer: 0 },
      { q: "9.", options: ["stereotype","prejudice","assumption","creativity"], answer: 3 },
      { q: "10.", options: ["go on strike","protest","encourage","demonstrate"], answer: 2 }
    ]
  },

  {
    id: "v8",
    title: "V8. Word Formation",
    instructions: "Write the correct form of the word in CAPITALS.",
    type: "text",
    questions: [
      { q: "1. Her __________ helped the team develop new ideas. (CREATE)", answer: ["creativity"] },
      { q: "2. The government received thousands of signatures on the __________. (PETITION)", answer: ["petition"] },
      { q: "3. The child showed great __________ when solving the problem alone. (INDEPENDENT)", answer: ["independence"] },
      { q: "4. His behaviour was extremely __________ and difficult to control. (REBEL)", answer: ["rebellious"] },
      { q: "5. The manager responded very __________ to the complaint. (GRACE)", answer: ["graciously"] },
      { q: "6. The protesters expressed their __________ peacefully. (ANGRY)", answer: ["anger"] },
      { q: "7. Their __________ of the problem was surprisingly accurate. (ANALYSE)", answer: ["analysis"] },
      { q: "8. She answered the question __________. (CONFIDENT)", answer: ["confidently"] },
      { q: "9. The workers demanded greater __________ from management. (RESPONSIBLE)", answer: ["responsibility"] },
      { q: "10. His __________ to succeed motivated him to work harder. (AMBITIOUS)", answer: ["ambition"] },
      { q: "11. The campaign successfully increased public __________ of the issue. (AWARE)", answer: ["awareness"] },
      { q: "12. The student behaved __________ throughout the discussion. (CONSIDER)", answer: ["considerately"] },
      { q: "13. Their __________ lasted for several days. (DEMONSTRATE)", answer: ["demonstration","demonstrations"] },
      { q: "14. The teacher appreciated her __________ and maturity. (SENSIBLE)", answer: ["sensibility","sensible judgement","sensible judgment"] },
      { q: "15. The proposal faced strong __________ from local residents. (OPPOSE)", answer: ["opposition"] }
    ]
  },

  {
    id: "v10",
    title: "V10. Synonym Selection",
    instructions: "Choose the closest meaning of the highlighted word.",
    type: "mcq",
    questions: [
      { q: "1. Her greatest ambition is to become a doctor.", options: ["problem","goal","habit","responsibility"], answer: 1 },
      { q: "2. He remained defiant despite repeated warnings.", options: ["obedient","resistant","anxious","sensible"], answer: 1 },
      { q: "3. The teacher tried to encourage students to participate.", options: ["motivate","distract","criticise","interrupt"], answer: 0 },
      { q: "4. She is very considerate towards elderly people.", options: ["ambitious","thoughtful","rebellious","independent"], answer: 1 },
      { q: "5. Social media can distract students from studying.", options: ["motivate","focus","divert","reward"], answer: 2 },
      { q: "6. They signed a petition demanding change.", options: ["complaint","request","speech","article"], answer: 1 },
      { q: "7. The plan was a sensible solution to the problem.", options: ["practical","creative","rebellious","risky"], answer: 0 },
      { q: "8. His creativity impressed the judges.", options: ["intelligence","originality","concentration","discipline"], answer: 1 },
      { q: "9. Many young people succumb to peer pressure.", options: ["resist","ignore","give in to","analyse"], answer: 2 },
      { q: "10. The workers decided to go on strike.", options: ["resign","negotiate","protest through stopping work","celebrate"], answer: 2 }
    ]
  }
];

/* ============================================================
   RENDER
   ============================================================ */
const container = document.getElementById("quizContainer");
const letters = ["A","B","C","D"];

quizData.forEach(section => {
  const sec = document.createElement("section");
  sec.className = "qsection";

  const titleDiv = document.createElement("div");
  titleDiv.className = "section-title";
  titleDiv.textContent = section.title;
  sec.appendChild(titleDiv);

  if (section.instructions) {
    const instr = document.createElement("div");
    instr.className = "section-instructions";
    instr.textContent = section.instructions;
    sec.appendChild(instr);
  }

  const body = document.createElement("div");
  body.className = "section-body";

  section.questions.forEach((item, qIndex) => {
    const qId = `${section.id}-${qIndex}`;
    const qDiv = document.createElement("div");
    qDiv.className = "question";
    qDiv.id = `wrap-${qId}`;

    const qText = document.createElement("p");
    qText.className = "qtext";
    qText.textContent = item.q;
    qDiv.appendChild(qText);

    if (section.type === "mcq") {
      const optsDiv = document.createElement("div");
      optsDiv.className = "options";
      item.options.forEach((opt, i) => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = qId;
        input.value = letters[i];
        label.appendChild(input);
        label.appendChild(document.createTextNode(`${letters[i]}. ${opt}`));
        optsDiv.appendChild(label);
      });
      qDiv.appendChild(optsDiv);

    } else if (section.type === "dropdown") {
      const select = document.createElement("select");
      select.id = qId;
      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "-- Select --";
      select.appendChild(blank);

      const opts = section.dropdownOptions;
      opts.forEach(opt => {
        const optionEl = document.createElement("option");
        if (typeof opt === "string") {
          optionEl.value = opt;
          optionEl.textContent = opt;
        } else {
          optionEl.value = opt.value;
          optionEl.textContent = opt.label;
        }
        select.appendChild(optionEl);
      });
      qDiv.appendChild(select);

    } else if (section.type === "text") {
      const input = document.createElement("input");
      input.type = "text";
      input.id = qId;
      input.autocomplete = "off";
      qDiv.appendChild(input);
    }

    const feedback = document.createElement("div");
    feedback.className = "feedback";
    feedback.id = `fb-${qId}`;
    qDiv.appendChild(feedback);

    body.appendChild(qDiv);
  });

  sec.appendChild(body);
  container.appendChild(sec);
});

/* ============================================================
   GRADING
   ============================================================ */
function normalize(str){
  return (str || "").toString().trim().toLowerCase().replace(/\s+/g," ");
}

function checkAnswers(){
  let total = 0, earned = 0;
  const sectionScores = [];

  quizData.forEach(section => {
    let secEarned = 0;
    const secTotal = section.questions.length;

    section.questions.forEach((item, qIndex) => {
      total++;
      const qId = `${section.id}-${qIndex}`;
      const qDiv = document.getElementById(`wrap-${qId}`);
      const fb = document.getElementById(`fb-${qId}`);
      let isCorrect = false;
      let correctLabel = "";

      if (section.type === "mcq") {
        const selected = document.querySelector(`input[name="${qId}"]:checked`);
        const correctLetter = letters[item.answer];
        correctLabel = `${correctLetter}. ${item.options[item.answer]}`;
        if (selected && selected.value === correctLetter) isCorrect = true;

      } else if (section.type === "dropdown") {
        const select = document.getElementById(qId);
        const val = select ? select.value : "";
        isCorrect = normalize(val) === normalize(item.answer);
        const opts = section.dropdownOptions;
        const match = opts.find(o => (typeof o === "string" ? o : o.value) === item.answer);
        correctLabel = typeof match === "string" ? match : (match ? match.label : item.answer);

      } else if (section.type === "text") {
        const input = document.getElementById(qId);
        const val = normalize(input ? input.value : "");
        isCorrect = item.answer.some(a => normalize(a) === val);
        correctLabel = item.answer.join(" / ");
      }

      qDiv.classList.remove("correct","incorrect");
      if (isCorrect) {
        qDiv.classList.add("correct");
        fb.textContent = "✓ Correct";
        earned++; secEarned++;
      } else {
        qDiv.classList.add("incorrect");
        fb.textContent = `✗ Correct answer: ${correctLabel}`;
      }
    });

    sectionScores.push(`${section.title.split(".")[0]}: ${secEarned}/${secTotal}`);
  });

  const pct = Math.round((earned/total)*100);
  const scoreBox = document.getElementById("scoreBox");
  scoreBox.style.display = "block";
  scoreBox.innerHTML = `Score: ${earned} / ${total} (${pct}%)<div class="sub">${sectionScores.join(" &nbsp;|&nbsp; ")}</div>`;
  scoreBox.scrollIntoView({behavior:"smooth", block:"start"});
}

function resetQuiz(){
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('select').forEach(s => s.value = "");
  document.querySelectorAll('input[type="text"]').forEach(t => t.value = "");
  document.querySelectorAll('.question').forEach(q => q.classList.remove("correct","incorrect"));
  document.getElementById("scoreBox").style.display = "none";
  window.scrollTo({top:0, behavior:"smooth"});
}

document.getElementById("checkBtn").addEventListener("click", checkAnswers);
document.getElementById("resetBtn").addEventListener("click", resetQuiz);
</script>

</body>
</html>
