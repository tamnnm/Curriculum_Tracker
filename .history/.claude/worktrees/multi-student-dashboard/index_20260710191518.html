<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Curriculum Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --green:#1B5E34; --green-light:#F0F7F2;
    --purple:#5B21B6; --purple-light:#F5F3FF;
    --gray-bg:#F4F7F4; --border:#E5E7EB;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--gray-bg);color:#111827;}
  .header{background:var(--green);color:#fff;padding:20px 24px;}
  .header-inner{max-width:900px;margin:0 auto;}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.65;margin-bottom:3px;}
  .h1{font-size:22px;font-weight:800;}
  .sub{font-size:13px;opacity:.75;margin-top:2px;}
  .progress-row{margin-top:14px;display:flex;align-items:center;gap:14px;}
  .progress-track{flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:#4ADE80;border-radius:4px;}
  .stats-row{display:flex;gap:14px;margin-top:7px;font-size:12px;opacity:.85;flex-wrap:wrap;}
  .tabs{background:#fff;border-bottom:1px solid var(--border);}
  .tabs-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;}
  .tab-btn{padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;color:#6B7280;}
  .tab-btn.active{border-bottom-color:var(--green);color:var(--green);}
  .content{max-width:900px;margin:0 auto;padding:24px 16px;}
  .banner{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;}
  .legend{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;font-size:12px;color:#9CA3AF;}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;border-radius:20px;padding:3px 10px;border:1px solid;}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .card-head{cursor:pointer;padding:14px 18px;display:flex;align-items:center;gap:14px;}
  .badge-num{width:32px;height:32px;border-radius:8px;background:var(--green-light);color:var(--green);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .badge-num.done{background:#D1FAE5;color:#065F46;}
  .card-title{font-weight:700;font-size:15px;}
  .card-meta{font-size:12px;color:#6B7280;margin-top:2px;}
  .grammar-tag{color:#7C3AED;font-weight:600;}
  .card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .mini-track{width:56px;height:5px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
  .mini-fill{height:100%;background:#3B82F6;border-radius:4px;}
  .mini-fill.done{background:#10B981;}
  .pct-label{font-size:12px;color:#9CA3AF;width:32px;}
  .chev{font-size:18px;color:#9CA3AF;display:inline-block;transition:transform .2s;}
  .chev.open{transform:rotate(90deg);}
  .milestone{background:#FEF3C7;border-top:1px dashed #F59E0B;padding:7px 18px;font-size:12px;font-weight:700;color:#92400E;}
  .card-body{padding:0 18px 18px;border-top:1px solid #F3F4F6;}
  .box{margin-top:14px;border-radius:10px;padding:12px 14px;border:1px solid;}
  .box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .grammar-badge{display:inline-flex;align-items:center;gap:6px;border:1.5px solid;border-radius:8px;padding:4px 8px;font-size:11px;}
  .grammar-badge b{font-weight:800;}
  .tag{font-size:11px;background:#F3F4F6;color:#6B7280;border:1px solid var(--border);border-radius:6px;padding:2px 8px;}
  .note{font-size:12px;color:#6B7280;font-style:italic;}
  .skill-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .skill-chip{display:flex;align-items:center;gap:6px;background:#F9FAFB;border-radius:8px;padding:5px 10px;font-size:12px;}
  .info-grid{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:640px){.info-grid{grid-template-columns:1fr;}}
  .info-block{background:#F9FAFB;border-radius:8px;padding:10px 12px;border-left:3px solid #0369A1;font-size:13px;line-height:1.6;color:#374151;}
  .info-block .bt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0369A1;margin-bottom:5px;}
  .sessions{margin-top:14px;}
  .session-row{border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12.5px;}
  .session-row .wk{font-weight:700;color:var(--green);margin-right:8px;}
  .session-row .topic{font-weight:600;}
  .session-row .notes{color:#4B5563;margin-top:4px;white-space:pre-wrap;}
  .grammar-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:640px){.grammar-grid{grid-template-columns:1fr;}}
  .grammar-cell{border:1.5px solid;border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;}
  .grammar-cell .num{font-weight:800;font-size:16px;min-width:28px;}
  .grammar-cell .st{font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px;white-space:nowrap;}
  .parent-card{border-radius:10px;padding:12px 14px;border:1.5px solid;margin-bottom:10px;}
  .parent-top{display:flex;justify-content:space-between;align-items:center;}
  .parent-note{font-size:12.5px;color:#374151;margin-top:6px;}
  .footer-note{font-size:11px;color:#9CA3AF;text-align:center;padding:18px;}
</style>
</head>

async function fetchSheetTab(name){
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
  const cols = json.table.cols.map((c,i) => c.label || `col${i}`);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((label,i) => { obj[label] = r.c[i] ? r.c[i].v : ""; });
    return obj;
  });
}

async function loadData(){
  if (!CONFIG.SHEET_ID) return {...SAMPLE, isSample:true};
  try {
    const [tracker, details, grammar, sessions] = await Promise.all([
      fetchSheetTab("Unit Tracker"),
      fetchSheetTab("Unit Details"),
      GRAMMAR_TRACK.enabled ? fetchSheetTab(GRAMMAR_TRACK.sheetTab) : Promise.resolve([]),
      fetchSheetTab("Session Notes"),
    ]);
    return {tracker, details, grammar, sessions, isSample:false};
  } catch(e){
    console.error("Failed to load Google Sheet, showing sample data.", e);
    return {...SAMPLE, isSample:true};
  }
}

function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }

function statusPill(status){
  const c = STATUS_COLORS[status] || STATUS_COLORS["Not begun"];
  return `<span class="pill" style="background:${c.bg};color:${c.text};border-color:${c.border}">
    <span class="dot" style="background:${c.dot}"></span>${status || "Not begun"}</span>`;
}

function grammarBadge(code, title, status){
  const c = GRAMMAR_COLORS[status] || GRAMMAR_COLORS["Upcoming"];
  return `<span class="grammar-badge" style="background:${c.bg};color:${c.text};border-color:${c.border}">
    <b>${code}</b> ${title}</span>`;
}

  tracker.forEach(u => SKILLS.forEach(s => { if ((u[s]||"") === "Completed") doneCount++; }));

      <div class="h1">${STUDENT.title}</div>

    <div class="footer-note">${DATA.isSample ? "Showing sample data — set a sheetId for this student in the STUDENTS config (or pass ?sheet=) to connect a live Google Sheet." : "Live data from Google Sheets."}</div>
  `;

  const tabsDef = [["units","Unit Plans"]];
  if (GRAMMAR_TRACK.enabled) tabsDef.push(["grammar", GRAMMAR_TRACK.tabLabel]);
  tabsDef.push(["sessions","Session Notes"], ["parent","Parent View"]);
  const tabsEl = document.getElementById("tabs");

  tabsDef.forEach(([key,label]) => {

    tabsEl.appendChild(b);
  });

  const content = document.getElementById("content");

}

function renderUnits(content, tracker, details, sessions){

      body.appendChild(el(`<div class="box" style="background:#F9FAFB;border-color:#E5E7EB">
        <div class="box-title" style="color:#9CA3AF">📖 GE9 Grammar (textbook reference)</div>
        <div class="badge-row">${(d["GE9 Grammar (textbook, reference only)"]||"").split(";").map(g=>g.trim()).filter(Boolean).map(g=>`<span class="tag">${g}</span>`).join("")}</div>
        <div class="note">${d["GE9 Grammar Note"]||""}</div>
      </div>`));

      const skillGrid = el(`<div class="skill-grid"></div>`);
      SKILLS.forEach(s => skillGrid.appendChild(el(`<div class="skill-chip"><span>${s}</span>${statusPill(u[s]||"Not begun")}</div>`)));
      body.appendChild(el(`<div style="margin-top:16px"><div class="box-title" style="color:#9CA3AF">Progress Tracker <span style="font-weight:400;text-transform:none;font-size:11px">(edit in Google Sheets)</span></div></div>`));
      body.appendChild(skillGrid);

      const info = el(`<div class="info-grid"></div>`);
      info.appendChild(el(`<div class="info-block"><div class="bt">Vocabulary — ${d["Vocabulary Themes"]||""}</div>
        <div><b>Core:</b> ${d["Core Vocabulary"]||""}</div>
        <div><b>Word families:</b> ${d["Word Families"]||""}</div>
        <div><b>Phrasal verbs:</b> ${d["Phrasal Verbs (EPVIU)"]||""}</div></div>`));
      info.appendChild(el(`<div class="info-block" style="border-left-color:#065F46"><div class="bt" style="color:#065F46">Use of English (GE9)</div>${d["Use of English (GE9)"]||""}</div>`));
      info.appendChild(el(`<div class="info-block" style="border-left-color:#1B5E34"><div class="bt" style="color:#1B5E34">✏️ Writing</div>${d["Writing Tasks"]||""}</div>`));
      info.appendChild(el(`<div class="info-block" style="border-left-color:#1B5E34"><div class="bt" style="color:#1B5E34">🗣️ Speaking</div>${d["Speaking Tasks"]||""}</div>`));
      body.appendChild(info);
      body.appendChild(el(`<div class="info-block" style="margin-top:10px;border-left-color:#6B7280"><div class="bt" style="color:#6B7280">🎧 Listening</div>${d["Listening Tasks"]||""}</div>`));

      const wkSessions = (sessionsByUnit[uid]||[]).filter(s=>s["Session Topic"]||s["Lecture Notes"]);
      const sess = el(`<div class="sessions"><div class="box-title" style="color:#9CA3AF">📝 Lecture Notes by Week</div></div>`);
      if (wkSessions.length){
        wkSessions.forEach(s => sess.appendChild(el(`<div class="session-row">
          <span class="wk">Wk ${s["Week #"]}</span><span class="topic">${s["Session Topic"]||"(no topic yet)"}</span>
          ${s["Date"]?` · <span style="color:#9CA3AF">${s["Date"]}</span>`:""}
          <div class="notes">${s["Lecture Notes"]||""}</div>
          ${s["Homework / Next Steps"]?`<div class="notes" style="color:#7C3AED"><b>Homework:</b> ${s["Homework / Next Steps"]}</div>`:""}
        </div>`)));
      } else {
        sess.appendChild(el(`<div class="note">No lecture notes logged yet for this unit's weeks — add them in the Session Notes tab of the Sheet.</div>`));
      }
      body.appendChild(sess);
      card.appendChild(body);
    }
    content.appendChild(card);
  });
}

function rendergrammar(content, grammar){
  content.appendChild(el(`<div class="box" style="background:#F5F3FF;border-color:#DDD6FE;margin-bottom:16px">
    <b>${GRAMMAR_TRACK.tagLabel} track status</b> — updated live from the ${GRAMMAR_TRACK.sheetTab} tab.
  </div>`));
  const grid = el(`<div class="grammar-grid"></div>`);
  grammar.forEach(row => {
    const st = row["Status"] || "Upcoming";
    const c = GRAMMAR_COLORS[st] || GRAMMAR_COLORS["Upcoming"];
    grid.appendChild(el(`<div class="grammar-cell" style="background:${c.bg};border-color:${c.border}">
      <span class="num" style="color:${c.text}">${row["Section"]}</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px;color:${c.text}">${row["Grammar Point"]}</div>
        <div style="font-size:11px;color:${c.text};opacity:.75">pp. ${row["Pages"]}</div>
        <div style="font-size:11px;color:${c.text};margin-top:2px;opacity:.7">→ ${row["Taught in / Mapped to"]||"—"}</div>
      </div>
      <span class="st" style="background:${c.border};color:${c.text}">${st}</span>
    </div>`));
  });
  content.appendChild(grid);
}

function renderSessions(content, sessions){
  const byUnit = {};
  sessions.forEach(s => { const k = s["Unit Title"]||("Unit "+s["Unit #"]); (byUnit[k]=byUnit[k]||[]).push(s); });
  Object.entries(byUnit).forEach(([unitTitle, rows]) => {
    content.appendChild(el(`<div style="font-weight:700;font-size:14px;color:#1B5E34;margin:16px 0 8px">${unitTitle}</div>`));
    rows.forEach(s => {
      content.appendChild(el(`<div class="session-row">
        <span class="wk">Wk ${s["Week #"]}</span><span class="topic">${s["Session Topic"]||"(no topic yet)"}</span>
        ${s["Date"]?` · <span style="color:#9CA3AF">${s["Date"]}</span>`:""}
        <div class="notes">${s["Lecture Notes"]||"<i style='color:#9CA3AF'>No notes logged yet.</i>"}</div>
        ${s["Homework / Next Steps"]?`<div class="notes" style="color:#7C3AED"><b>Homework:</b> ${s["Homework / Next Steps"]}</div>`:""}
      </div>`));
    });
  });
}

function renderParent(content, tracker){
  content.appendChild(el(`<div class="box" style="background:#F0FDF4;border-color:#BBF7D0;margin-bottom:16px">
    Progress overview for families. Percentages reflect vocabulary, grammar, writing, speaking, listening and testing combined.
  </div>`));
  tracker.forEach(u => {
    const statuses = SKILLS.map(s => u[s] || "Not begun");
    const doneCount = statuses.filter(s=>s==="Completed").length;
    const pct = Math.round((doneCount/SKILLS.length)*100);
    const overall = pct===100 ? "Completed" : pct===0 ? "Not begun" : "In progress";
    const c = STATUS_COLORS[overall];
    content.appendChild(el(`<div class="parent-card" style="background:${c.bg};border-color:${c.border}">
      <div class="parent-top">
        <div><b>Unit ${u["Unit #"]}:</b> ${u["Title"]} <span style="color:#9CA3AF;font-size:12px">(Wks ${u["Weeks"]})</span></div>
        <span class="pill" style="background:${c.border};color:${c.text}">${pct}% · ${overall}</span>
      </div>
      ${u["Milestone"] ? `<div class="parent-note" style="color:#B45309"><b>🏁 ${u["Milestone"]}</b></div>` : ""}
    </div>`));
  });
}

(async function init(){
  const app = document.getElementById("app");
  if (!STUDENT){
    app.innerHTML = `<div style="padding:60px;text-align:center;color:#9CA3AF">
      Unknown student "<b>${studentKey}</b>". Check the <code>?student=</code> URL param,
      or add an entry for it in the STUDENTS config at the top of this file.
    </div>`;
    return;
  }
  document.title = STUDENT.title || "Curriculum Dashboard";
  app.innerHTML = `<div style="padding:60px;text-align:center;color:#9CA3AF">Loading curriculum…</div>`;
  DATA = await loadData();
  render();
})();
</script>
</body>
</html>
